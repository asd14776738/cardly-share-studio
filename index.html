<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="把网页和社交内容链接变成精美的分享卡片。" />
    <title>Cardly — 链接卡片生成器</title>
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#" aria-label="Cardly 首页">
        <span class="brand-mark" aria-hidden="true"><i></i><i></i><i></i></span>
        <span>Cardly</span>
      </a>
      <nav aria-label="主导航">
        <a href="#studio">创作台</a>
        <a href="#recent">灵感</a>
      </nav>
      <button class="button button-dark header-export" data-download>
        <span>导出图片</span>
        <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M10 3v9m0 0 3.5-3.5M10 12 6.5 8.5M4 14.5V17h12v-2.5"/></svg>
      </button>
    </header>

    <main>
      <section class="intro" aria-labelledby="page-title">
        <h1 id="page-title">把链接，变成值得分享的卡片</h1>
        <p>粘贴网页或社交内容链接，几秒完成排版。</p>
      </section>

      <section class="studio" id="studio">
        <div class="editor-column">
          <div class="source-tabs" role="tablist" aria-label="内容来源">
            <button class="source-tab active" data-source="web" role="tab" aria-selected="true"><span class="source-icon">⌁</span>网页</button>
            <button class="source-tab" data-source="telegram" role="tab" aria-selected="false"><span class="source-icon">↗</span>Telegram</button>
            <button class="source-tab" data-source="x" role="tab" aria-selected="false"><span class="source-icon">𝕏</span>X</button>
            <button class="source-tab" data-source="instagram" role="tab" aria-selected="false"><span class="source-icon">◎</span>Instagram</button>
          </div>

          <div class="input-block">
            <label for="source-url">内容链接</label>
            <div class="url-row">
              <input id="source-url" type="url" value="https://www.archdaily.cn/cn/1012043" autocomplete="off" />
              <button class="button button-blue" id="generate-button">生成卡片</button>
            </div>
            <p class="input-hint" id="source-hint">支持文章、作品集、产品页等公开网页</p>
          </div>

          <div class="settings-grid">
            <fieldset>
              <legend>画布比例</legend>
              <div class="segmented" id="ratio-control">
                <button data-ratio="square" class="active"><span class="ratio-icon square"></span>方形</button>
                <button data-ratio="wide"><span class="ratio-icon wide"></span>横版</button>
                <button data-ratio="portrait"><span class="ratio-icon portrait"></span>竖版</button>
              </div>
            </fieldset>
            <fieldset>
              <legend>卡片布局</legend>
              <div class="segmented compact" id="layout-control">
                <button data-layout="editorial" class="active">杂志</button>
                <button data-layout="minimal">极简</button>
              </div>
            </fieldset>
          </div>

          <fieldset class="theme-fieldset">
            <legend>背景主题</legend>
            <div class="theme-list" id="theme-control">
              <button class="theme-swatch mist active" data-theme="mist" aria-label="雾光"></button>
              <button class="theme-swatch cobalt" data-theme="cobalt" aria-label="钴蓝"></button>
              <button class="theme-swatch ink" data-theme="ink" aria-label="墨黑"></button>
              <button class="theme-swatch coral" data-theme="coral" aria-label="珊瑚红"></button>
              <button class="theme-swatch lime" data-theme="lime" aria-label="青柠"></button>
              <button class="theme-swatch paper" data-theme="paper" aria-label="纸白"></button>
            </div>
          </fieldset>

          <div class="copy-fields">
            <label for="card-title">标题</label>
            <textarea id="card-title" rows="2">在海风与山影之间，重新想象公共空间</textarea>
            <div class="field-meta"><label for="card-description">内容摘要</label><span id="char-count">38 / 120</span></div>
            <textarea id="card-description" rows="3">一座面向海岸的文化建筑，以层叠露台连接城市生活与自然景观。</textarea>
          </div>

          <div class="upload-row">
            <div>
              <strong>封面图片</strong>
              <span>推荐 1600 × 900 px</span>
            </div>
            <label class="upload-button" for="image-upload">更换图片</label>
            <input id="image-upload" type="file" accept="image/*" hidden />
          </div>
        </div>

        <aside class="preview-column" aria-labelledby="preview-title">
          <div class="preview-head">
            <div><span class="live-dot"></span><h2 id="preview-title">实时预览</h2></div>
            <span id="canvas-size">1080 × 1080</span>
          </div>
          <div class="preview-stage">
            <article class="share-card theme-mist ratio-square layout-editorial source-web" id="share-card">
              <div class="card-topline">
                <div class="source-brand"><span class="source-brand-icon"><img id="source-icon-image" alt="" /><span class="source-brand-fallback">⌁</span></span><span id="source-name">ARCHDAILY.CN</span></div>
                <span class="card-number">CARD / 01</span>
              </div>
              <div class="cover-wrap">
                <img id="cover-image" src="https://images.unsplash.com/photo-1518005020951-eccb494ad742?auto=format&fit=crop&w=1600&q=88" alt="现代建筑与天空" crossorigin="anonymous" />
                <span class="cover-index">01</span>
              </div>
              <div class="card-copy">
                <p class="card-kicker" id="card-kicker">ARCHITECTURE · 6 MIN READ</p>
                <h3 id="preview-card-title">在海风与山影之间，重新想象公共空间</h3>
                <p id="preview-card-description">一座面向海岸的文化建筑，以层叠露台连接城市生活与自然景观。</p>
              </div>
              <div class="card-footer">
                <div class="mini-code" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
                <span>扫码阅读原文</span>
                <span class="footer-arrow">↗</span>
              </div>
            </article>
          </div>
          <div class="preview-actions">
            <button class="reset-button" id="reset-button">
              <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M4.2 7.2A6.2 6.2 0 1 1 4 12m.2-4.8V3.8M4.2 7.2h3.4"/></svg>
              重置
            </button>
            <button class="button button-blue download-main" data-download>
              下载 PNG
              <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M10 3v9m0 0 3.5-3.5M10 12 6.5 8.5M4 14.5V17h12v-2.5"/></svg>
            </button>
          </div>
        </aside>
      </section>

      <section class="recent" id="recent" aria-labelledby="recent-title">
        <div class="section-head">
          <h2 id="recent-title">最近创作</h2>
          <button id="clear-recent">清空记录</button>
        </div>
        <div class="recent-grid">
          <button class="recent-card recent-web" data-preset="web"><span>网页</span><strong>留白，是设计中最有力的声音</strong><small>MONOCLE.COM</small></button>
          <button class="recent-card recent-x" data-preset="x"><span>𝕏</span><strong>Good design is as little design as possible.</strong><small>@designnotes</small></button>
          <button class="recent-card recent-instagram" data-preset="instagram"><span>◎</span><strong>週末，在城市里收集光影。</strong><small>@slow.weekend</small></button>
        </div>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
